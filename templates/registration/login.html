{% extends "base.html" %}
{% load static %}

{% block title %}Кіру - Emotion AI{% endblock %}

{% block content %}
<section class="section-gap">
  <div class="container-xl" style="max-width:420px;">
    <div class="glassy card">
      <h2>Кіру</h2>

      {% if form.errors %}
        <div style="background: #ffebee; padding: 10px; border-radius: 5px; margin-bottom: 15px; color: #c62828;">
          <strong>Қате!</strong> Пайдаланушы аты немесе құпиясөз дұрыс емес.
        </div>
      {% endif %}

      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}

        <div style="margin-bottom: 15px;">
          <label for="id_username" style="display: block; margin-bottom: 5px; font-weight: 500;">Пайдаланушы аты:</label>
          <input type="text" name="username" id="id_username" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
        </div>

        <div style="margin-bottom: 15px;">
          <label for="id_password" style="display: block; margin-bottom: 5px; font-weight: 500;">Құпиясөз:</label>
          <input type="password" name="password" id="id_password" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
        </div>

        <button type="submit" class="btn primary" style="width:100%; margin-top:10px;">Кіру</button>
      </form>

      <p style="margin-top:15px; text-align:center;">
        Тіркелгіңіз жоқ па? <a href="{% url 'analyzer:register' %}">Тіркелу</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
